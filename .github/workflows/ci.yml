name: CI Flutter

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  analise_de_codigo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup do Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Preparar ambiente e Instalar dependencias
        run: |
          cd mobile
          touch .env
          echo "SENTRY_DSN=https://fake_dsn@sentry.io/1" > .env
          flutter pub get

      - name: Executar Linter
        run: |
          cd mobile
          flutter analyze

      - name: Executar Testes Unitarios
        run: |
          cd mobile
          flutter test